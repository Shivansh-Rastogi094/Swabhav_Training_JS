<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    
    <form class="Weather">
        <input type="text" class="cityInput" placeholder="Enter city name">
        <button type="submit">Get Weather</button>
    </form>

    <div class="card" style="display: none">
        <h1 class="city-display">Miami</h1>
        <p class="temp-display">90 F</p>
        <p class="humidity-display">Humidity 75%</p>
        <p class="desc-display">Clear Skies</p>
        <p class="emoji-display">☀️</p>
        <p class="error-display">Please enter a city</p>
    </div>

    <script src="./script.js"></script>
</body>
</html>
